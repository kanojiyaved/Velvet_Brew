<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velvet Brew | Digital Menu</title>
    <meta name="description" content="Interactive digital menu for Velvet Brew café." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/menu.css" />
    <link rel="stylesheet" href="./assets/css/responsive.css" />
  </head>
  <body class="menu-page">
    <header class="menu-header">
      <div class="container-fluid px-3 px-md-4">
        <div class="menu-nav d-flex align-items-center justify-content-between gap-2">
          <a href="index.html" class="brand-pill">
            <img src="./assets/images/hero-bg.svg" alt="Velvet Brew logo" />
            <span>Velvet Brew</span>
          </a>

          <label class="search-shell" aria-label="Search menu">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="searchInput" type="search" placeholder="Search coffee, pizza, desserts..." />
          </label>

          <div class="nav-actions">
            <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">
              <i class="fa-solid fa-moon"></i>
            </button>
            <a href="index.html" class="back-btn">
              <i class="fa-solid fa-arrow-left"></i>
              <span>Back</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="menu-main">
      <section class="hero-banner">
        <div class="container hero-banner__content">
          <p class="eyebrow">Today’s Special</p>
          <h1 id="heroTitle">Crafted for every craving</h1>
          <p id="heroDescription">Discover our signature beverages, comfort plates, and sweet endings.</p>
          <div class="chip-row">
            <span class="pill">Freshly Brewed</span>
            <span class="pill">Seasonal Specials</span>
            <span class="pill">Handcrafted</span>
          </div>
        </div>
      </section>

      <section class="container menu-section">
        <div id="categoryNav" class="category-row"></div>
        <div class="filters-row" id="filterChips">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="veg">Veg</button>
          <button class="filter-chip" data-filter="nonveg">Non-Veg</button>
        </div>

        <div id="menuGrid" class="menu-grid"></div>
        <div id="emptyState" class="empty-state d-none">
          <i class="fa-solid fa-magnifying-glass"></i>
          <h3>No menu items match your search.</h3>
          <p>Try a different name, keyword, or category.</p>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/menu.js"></script>
  </body>
</html>
